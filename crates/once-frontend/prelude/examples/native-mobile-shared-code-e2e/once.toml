[[target]]
name = "SharedSwiftAndroid"
kind = "swift_android_library"
srcs = ["shared/swift/Sources/**/*.swift"]

[target.attrs]
module_name = "SharedSwift"
target = "aarch64-unknown-linux-android"

[[target]]
name = "SharedKotlinApple"
kind = "kotlin_apple_framework"
srcs = ["shared/kotlin/Sources/**/*.kt"]

[target.attrs]
platform = "ios"
sdk_variant = "simulator"
arch = "arm64"
product_name = "SharedKotlin"
module_name = "SharedKotlin"

[[target]]
name = "SharedRustAndroid"
kind = "rust_library"
srcs = ["shared/rust/src/**/*.rs"]

[target.attrs]
crate_name = "shared_rust"
crate_root = "shared/rust/src/lib.rs"
crate_type = "cdylib"
target = "aarch64-linux-android"

[[target]]
name = "SharedRustApple"
kind = "rust_library"
srcs = ["shared/rust/src/**/*.rs"]

[target.attrs]
crate_name = "shared_rust"
crate_root = "shared/rust/src/lib.rs"
crate_type = "staticlib"
target = "aarch64-apple-ios-sim"

[[target]]
name = "AndroidApp"
kind = "android_binary"
srcs = ["android/src/**/*.kt"]
deps = ["./SharedSwiftAndroid", "./SharedRustAndroid"]

[target.attrs]
application_id = "dev.once.shared"
manifest = "android/AndroidManifest.xml"
resource_files = ["android/res/**"]
min_sdk_version = 23
version_code = 1
version_name = "1.0"

[[target]]
name = "AppleApp"
kind = "apple_application"
srcs = ["apple/Sources/**/*.swift"]
deps = ["./SharedKotlinApple", "./SharedRustApple"]

[target.attrs]
platform = "ios"
bundle_id = "dev.once.Shared"
minimum_os = "17.0"
sdk_variant = "simulator"
families = ["iphone"]
