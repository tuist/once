id = "macos-cli"
name = "macOS command-line app"
toolchain = "apple"
description = "macOS command-line app with a Swift library target."
aliases = ["apple-macos-cli"]
next_steps = [
  "fabrik build {{binary_name}}",
]

[[prompts]]
name = "library_name"
prompt = "Swift library name"
description = "Used as the swift_library target name and imported module."
default = "Greeter"
validation = "pascal_case"

[[prompts]]
name = "binary_name"
prompt = "Application target name"
description = "Used as the macOS executable target name."
default = "hello"
validation = "kebab_case"

[[prompts]]
name = "module_name"
prompt = "Application module name"
description = "Used as the macOS command line application module name."
default = "Hello"
validation = "pascal_case"

[[prompts]]
name = "minimum_os"
prompt = "Minimum macOS version"
description = "Passed through to both generated Apple targets."
default = "15.0"
validation = "version"

[[prompts]]
name = "greeting_subject"
prompt = "Greeting subject"
description = "Returned by the generated Swift library helper."
default = "macOS Swift"
validation = "line_text"

[[files]]
path = "fabrik.toml"
source = "fabrik.toml.tmpl"

[[files]]
path = "Sources/main.swift"
source = "Sources/main.swift.tmpl"

[[files]]
path = "Sources/{{library_name}}.swift"
source = "Sources/Greeter.swift.tmpl"

[[files]]
path = "README.md"
source = "README.md.tmpl"
