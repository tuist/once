name: blick

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: blick-${{ github.head_ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  review:
    name: Review
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install mise toolchain
        uses: jdx/mise-action@v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node"

      - name: install blick and opencode
        run: |
          mise use -g github:tuist/blick
          mise use -g npm:opencode-ai

      - name: run blick review
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FIREWORKS_API_KEY:-}" ]; then
            echo "FIREWORKS_API_KEY is not set; add it to repo secrets so opencode can authenticate against Fireworks." >&2
            exit 1
          fi
          blick review \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            --json --stream

      - name: publish review
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: blick publish

      - name: upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blick-runs
          path: .blick/runs/
          if-no-files-found: ignore
