name: web

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/web.yml"
      - "infra/**"
      - "web/**"
      - "mise.toml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/web.yml"
      - "infra/**"
      - "web/**"
      - "mise.toml"

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  build:
    name: build
    runs-on: tuist-linux
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: web/deps
          key: web-deps-${{ runner.os }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: web/_build
          key: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-

      - run: mise exec -- mix deps.get
      - run: mise exec -- mix compile --warnings-as-errors

  format:
    name: format
    runs-on: tuist-linux
    needs: build
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: web/deps
          key: web-deps-${{ runner.os }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: web/_build
          key: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-

      - run: mise exec -- mix deps.get
      - run: mise exec -- mix format --check-formatted

  test:
    name: test
    runs-on: tuist-linux
    needs: build
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: web/deps
          key: web-deps-${{ runner.os }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-deps-${{ runner.os }}-

      - name: Cache build
        uses: actions/cache@v5
        with:
          path: web/_build
          key: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-${{ hashFiles('web/mix.lock') }}
          restore-keys: web-build-${{ runner.os }}-${{ env.MIX_ENV }}-

      - run: mise exec -- mix deps.get
      - run: mise exec -- mix test

  release:
    name: release
    runs-on: tuist-linux
    defaults:
      run:
        working-directory: web
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - run: mise exec -- mix deps.get --only prod
      - run: mise exec -- mix compile
      - run: mise exec -- mix assets.deploy
      - run: mise exec -- mix release --overwrite

  docker:
    name: docker
    runs-on: tuist-linux
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: ./web
          file: ./web/Dockerfile
          push: false
          platforms: linux/amd64
          tags: once-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: helm
    runs-on: tuist-linux
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: "helm"
          cache: "false"

      - run: mise exec -- helm lint infra/helm/once
      - run: mise exec -- helm template once infra/helm/once --namespace once-production >/tmp/once-helm-rendered.yaml
