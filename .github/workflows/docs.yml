name: docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "mise.toml"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0

jobs:
  build:
    name: build docs
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7

      - name: install mise toolchain
        uses: jdx/mise-action@v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node aube"

      - name: install dependencies
        run: aube ci

      - name: build docs
        run: aube run build

  deploy:
    name: deploy docs
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: https://docs.buildonce.dev
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7

      - name: install mise toolchain
        uses: jdx/mise-action@v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "node aube"

      - name: install dependencies
        run: aube ci

      - name: build docs
        run: aube run build

      - name: deploy to Cloudflare Workers
        run: aube run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
