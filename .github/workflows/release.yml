name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: "2026.4.18"
  MISE_GITHUB_ATTESTATIONS: 0
  # The release jobs install only the tool they need via the mise-action
  # install_args (rust for builds, git-cliff for detect/publish). Without
  # these, running a task or a mise shim makes mise reinstall the entire
  # mise.toml toolset on every matrix platform, which fails on the tools
  # that ship no Windows / x86_64-macOS asset (blick, aube, opencode-ai).
  MISE_AUTO_INSTALL: "false"
  MISE_TASK_RUN_AUTO_INSTALL: "false"
  MISE_NOT_FOUND_AUTO_INSTALL: "false"
  MISE_EXEC_AUTO_INSTALL: "false"

jobs:
  detect:
    name: Check for releasable changes
    runs-on: ubuntu-24.04
    outputs:
      should-release: ${{ steps.detect.outputs.should-release }}
      latest-version: ${{ steps.detect.outputs.latest-version }}
      next-version: ${{ steps.detect.outputs.next-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
      - name: Detect release
        id: detect
        run: mise run release:detect

  build:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.should-release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      # mise-action provides Git Bash on Windows runners; using bash on
      # every platform means the package script can stay one file.
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          # Restrict to rust so shellspec (no Windows binary) doesn't
          # block the Windows job.
          install_args: "rust"
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-${{ matrix.target }}
          cache-on-failure: true
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Package release archive
        run: mise run release:package --target "${{ matrix.target }}" --version "${{ needs.detect.outputs.next-version }}"
      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  build-xcframework:
    name: Build Once.xcframework
    needs: detect
    if: needs.detect.outputs.should-release == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-xcframework
          cache-on-failure: true
      - name: Package XCFramework
        run: mise run release:package-xcframework --version "${{ needs.detect.outputs.next-version }}"
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_DEVELOPER_ID_CERTIFICATE_ENCRYPTION_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_ENCRYPTION_PASSWORD }}
          APPLE_DEVELOPER_ID_CERTIFICATE_NAME: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_NAME }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: Once.xcframework
          path: dist/*

  build-sdk-libs:
    name: Build SDK libraries ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.should-release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust"
      - if: startsWith(matrix.runner, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-sdk-${{ matrix.target }}
          cache-on-failure: true
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Package SDK libraries
        run: mise run release:package-sdk-libs --target "${{ matrix.target }}"
      - name: Upload SDK libraries
        uses: actions/upload-artifact@v7
        with:
          name: sdk-libs-${{ matrix.target }}
          path: |
            packages/js/prebuilds/*
            packages/ruby/prebuilds/*

  publish:
    name: Publish GitHub release
    needs:
      - detect
      - build
      - build-xcframework
    if: needs.detect.outputs.should-release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "git-cliff"
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Flatten artifacts
        run: find dist -type f -exec mv {} dist/ \;
      - name: Generate release notes
        run: mise run release:notes --version "${{ needs.detect.outputs.next-version }}" > release-notes.md
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: mise run release:publish --version "${{ needs.detect.outputs.next-version }}" --notes release-notes.md --dist dist

  publish-sdks:
    name: Publish RubyGems and npm packages
    needs:
      - detect
      - publish
      - build-sdk-libs
    if: needs.detect.outputs.should-release == 'true' && needs.publish.result == 'success' && needs.build-sdk-libs.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: sdk-libs-*
          merge-multiple: true
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust ruby node"
      - uses: 1password/load-secrets-action/configure@dafbe7cb03502b260e2b2893c753c352eee545bf
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf
        with:
          export-env: true
        env:
          RUBYGEMS_API_KEY: op://once/RubyGems API Key/api_key
          NPM_TOKEN: op://once/npm Automation Token/token
      - name: Configure package registries
        run: |
          echo "::add-mask::${RUBYGEMS_API_KEY}"
          echo "::add-mask::${NPM_TOKEN}"
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          chmod 0600 ~/.npmrc
      - name: Publish SDK packages
        run: |
          export GEM_HOST_API_KEY="${RUBYGEMS_API_KEY}"
          mise run release:publish-sdks --version "${{ needs.detect.outputs.next-version }}"
