name: once

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: once-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      rust_ci: ${{ steps.filter.outputs.rust_ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        name: classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="${head}^"
            fi
          fi

          git diff --name-only "$base" "$head" > changed-files.txt

          rust_ci=false
          while IFS= read -r path; do
            case "$path" in
              Cargo.toml|Cargo.lock|mise.toml|once.toml|crates/*|spec/*|mise/tasks/*|.cargo/*)
                rust_ci=true
                ;;
            esac
          done < changed-files.txt

          echo "rust_ci=$rust_ci" >> "$GITHUB_OUTPUT"
          echo "Rust CI required: $rust_ci"
          sed 's/^/- /' changed-files.txt

  fmt:
    name: fmt
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - run: rustup component add rustfmt
      - run: mise exec -- cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-on-failure: true
          cache-bin: false
      - run: mise exec -- cargo clippy --workspace --all-targets -- -D warnings

  tests:
    name: tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests-${{ matrix.os }}
          cache-on-failure: true
          cache-bin: false
      - run: mise exec -- cargo test --workspace --all-targets

  release-build:
    name: release build (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-build-${{ matrix.os }}
          cache-on-failure: true
          cache-bin: false
      - name: Build release binary with Once
        run: |
          set -euo pipefail
          once_bin="$(./mise/tasks/release/bootstrap-once.sh)"
          host_target="$(rustc -vV | sed -n 's/^host: //p')"
          suffix="$(printf '%s' "${host_target}" | tr '.-' '__')"
          target_id="crates/once-cli/once_cli_${suffix}"
          trap './mise/tasks/release/write-rust-release-manifests.sh --clear >/dev/null 2>&1 || true' EXIT
          ./mise/tasks/release/prepare-rust-graph-deps.sh --target "${host_target}"
          ./mise/tasks/release/write-rust-release-manifests.sh --target "${host_target}" --version 0.0.0
          "${once_bin}" build "${target_id}" --format json --quiet
          mkdir -p target/release
          cp ".once/out/${target_id}/once" target/release/once
        env:
          GH_TOKEN: ${{ github.token }}
          ONCE_BOOTSTRAP_SOURCE: source
      - uses: actions/upload-artifact@v7
        with:
          name: once-${{ matrix.os }}
          path: target/release/once

  dogfood:
    name: dogfood (${{ matrix.os }})
    needs: [changes, release-build]
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev
      - uses: actions/download-artifact@v8
        with:
          name: once-${{ matrix.os }}
          path: target/release
      - run: chmod +x target/release/once
      - run: mise exec -- target/release/once exec -e HOME="$HOME" -e PATH="$PATH" -e RUSTUP_TOOLCHAIN="$RUSTUP_TOOLCHAIN" -e MISE_TRUSTED_CONFIG_PATHS="$MISE_TRUSTED_CONFIG_PATHS" -- cargo check --workspace

  shellspec:
    name: shellspec (${{ matrix.os }})
    needs: [changes, release-build]
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: once-${{ matrix.os }}
          path: target/release
      - run: chmod +x target/release/once
      - run: mise exec -- shellspec

  windows-build:
    name: windows build
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: install pinned rust
        shell: bash
        run: |
          rust_version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          rustup toolchain install "$rust_version" --profile minimal --no-self-update
          rustup default "$rust_version"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true
          cache-bin: false
      - run: |
          # Build the SDK crate separately to avoid a Windows PDB name collision
          # between the `once` cdylib and the CLI binary.
          cargo build --workspace --all-targets --exclude once
          cargo build --package once --all-targets

  windows-release-build:
    name: release graph build (windows-latest)
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      MISE_VERSION: "2026.4.18"
      MISE_GITHUB_ATTESTATIONS: 0
      MISE_AUTO_INSTALL: "false"
      MISE_TASK_RUN_AUTO_INSTALL: "false"
      MISE_NOT_FOUND_AUTO_INSTALL: "false"
      MISE_EXEC_AUTO_INSTALL: "false"
      ONCE_BOOTSTRAP_SOURCE: source
    steps:
      - uses: actions/checkout@v6
      - name: Set HOME for mise templates
        shell: pwsh
        run: '"HOME=$env:USERPROFILE" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: ${{ env.MISE_VERSION }}
          install_args: "rust jq"
      - name: Add Rust target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Check Rust toolchain
        run: mise exec -- rustc -vV
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-graph-build-windows
          cache-on-failure: true
          cache-bin: false
      - name: Build Windows release binary with Once
        run: |
          set -euo pipefail

          once_bin="$(./mise/tasks/release/bootstrap-once.sh)"
          target="x86_64-pc-windows-msvc"
          suffix="$(printf '%s' "${target}" | tr '.-' '__')"
          target_id="crates/once-cli/once_cli_${suffix}"
          trap './mise/tasks/release/write-rust-release-manifests.sh --clear >/dev/null 2>&1 || true' EXIT
          ./mise/tasks/release/prepare-rust-graph-deps.sh --target "${target}"
          ./mise/tasks/release/write-rust-release-manifests.sh --target "${target}" --version 0.0.0
          rc=0
          "${once_bin}" build "${target_id}" --format json --quiet || rc=$?
          if [ "${rc}" != "0" ]; then
            echo "::group::DIAG: cargo_dependencies dir listing"
            ls -la ".once/out/cargo_dependencies_${suffix}/" 2>&1 || echo "<dir missing>"
            echo "::endgroup::"
            echo "::group::DIAG: failing-crate dirs (rlib + proc-macro artifacts)"
            for crate in serde clap tokio tracing tracing-subscriber tracing-appender serde_derive clap_derive tokio-macros tracing-attributes; do
              for d in ".once/out/cargo_dependencies_${suffix}/${crate}"*/; do
                if [ -d "$d" ]; then
                  echo "--- $d ---"
                  ls -la "$d" 2>&1 | head -20
                fi
              done
            done
            echo "::endgroup::"
            echo "::group::DIAG: workspace crate output dirs"
            for c in once-cas once-core once-frontend; do
              d=".once/out/crates/${c}/${c//-/_}_${suffix}/"
              if [ -d "$d" ]; then
                echo "--- $d ---"
                ls -la "$d" 2>&1
              fi
            done
            echo "::endgroup::"
            echo "::group::DIAG: rustc response file"
            rsp=".once/tmp/analysis/${target_id}/rustc.rsp"
            if [ -f "$rsp" ]; then
              echo "rsp: $rsp ($(wc -c <"$rsp") bytes)"
              echo "--- all --extern entries (one per line) ---"
              tr -d '\r' <"$rsp" | awk '/^--extern$/{getline v; print v}' | sort
              echo "--- all -L dependency entries (one per line) ---"
              tr -d '\r' <"$rsp" | awk 'p==1{print; p=0} /^-L$/{p=1}' | sort -u
            else
              echo "rsp not found at $rsp"
            fi
            echo "::endgroup::"
            echo "::group::DIAG: rlib archive contents (verify they are real rlibs, not metadata-only)"
            for rlib in \
              ".once/out/crates/once-cas/once_cas_${suffix}/libonce_cas.rlib" \
              ".once/out/crates/once-core/once_core_${suffix}/libonce_core.rlib" \
              ".once/out/cargo_dependencies_${suffix}/serde-1.0.228/libserde.rlib" \
              ".once/out/cargo_dependencies_${suffix}/clap-4.6.1/libclap.rlib"; do
              if [ -f "$rlib" ]; then
                echo "--- $rlib ($(wc -c <"$rlib") bytes) ---"
                "C:/Users/runneradmin/.rustup/toolchains/1.96.0-x86_64-pc-windows-msvc/lib/rustlib/x86_64-pc-windows-msvc/bin/llvm-ar" t "$rlib" 2>&1 | head -8 || echo "(ar failed)"
              fi
            done
            echo "::endgroup::"
            exit $rc
          fi
          test -f ".once/out/${target_id}/once.exe"

  windows-cas-test:
    name: windows cas test
    needs: changes
    if: needs.changes.outputs.rust_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: install pinned rust
        shell: bash
        run: |
          rust_version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          rustup toolchain install "$rust_version" --profile minimal --no-self-update
          rustup default "$rust_version"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-cas-test
          cache-on-failure: true
          cache-bin: false
      - run: cargo test -p once-cas
