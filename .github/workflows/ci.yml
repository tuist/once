name: fabrik

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: fabrik-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # rust-cache is more effective than cargo's incremental compilation in
  # CI: incremental dirties artifacts that the cache then has to ship.
  CARGO_INCREMENTAL: "0"
  # Smaller debug info => smaller cache entries.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  # Be patient with flaky network steps so a one-off blip doesn't waste
  # the cached compile.
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  RUST_BACKTRACE: "1"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install mise toolchain (cached)
        uses: jdx/mise-action@v2
        with:
          experimental: true
          # mise-action caches installed tools by default; this line
          # makes it explicit so a future change is loud.
          cache: true

      - name: install rustfmt + clippy components
        # mise's rust install ships rustup but no components; pull them
        # in explicitly. rustup's own download cache is captured by
        # rust-cache below.
        run: rustup component add rustfmt clippy

      - name: cache cargo registry, git db, and target
        uses: Swatinem/rust-cache@v2
        with:
          # A single shared key for the lint job means rustfmt and
          # clippy reuse the same target directory across runs.
          shared-key: lint
          # Don't lose the cache when one of the lint commands fails;
          # the next run still gets a warm restore after a red build.
          cache-on-failure: true
          # Cache cargo-installed binaries (currently none, but free).
          cache-bin: true

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: install mise toolchain (cached)
        uses: jdx/mise-action@v2
        with:
          experimental: true
          cache: true

      - name: cache cargo registry, git db, and target
        uses: Swatinem/rust-cache@v2
        with:
          # Per-OS shared key so unit tests, the release build, and the
          # shellspec suite all reuse one target/ directory inside one
          # job, while staying isolated from the other OS and the lint
          # job (different compile flags, different cache namespace).
          shared-key: test-${{ matrix.os }}
          cache-on-failure: true
          cache-bin: true

      - name: cargo test --workspace --all-targets
        run: cargo test --workspace --all-targets

      - name: cargo build --release
        # Builds the binary the shellspec suite consumes. Sharing the
        # target dir with the previous step avoids recompiling
        # dependencies; only the release-profile codegen units are
        # fresh work.
        run: cargo build --release

      - name: fabrik targets
        run: target/release/fabrik targets

      - name: fabrik builds itself
        run: target/release/fabrik run //:fabrik

      - name: shellspec
        run: mise exec -- shellspec

  windows:
    # Windows isn't a first-class runtime target yet — most fabrik-core
    # tests shell out to /bin/sh, and the shellspec suite is bash-only —
    # but the workspace must compile cleanly on windows-msvc so that
    # platform-specific regressions (path handling, Stdio piping, the
    # cfg-gated fsync_dir fallback) are caught early. fabrik-cas has no
    # subprocess dependency, so its tests run here too.
    #
    # mise is skipped on Windows because shellspec has no Windows
    # binary; rust is installed directly via rustup, which is preloaded
    # on windows-latest runners.
    name: build (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: install rust 1.86
        shell: bash
        run: |
          rustup toolchain install 1.86 --profile minimal --no-self-update
          rustup default 1.86

      - name: cache cargo registry, git db, and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-windows
          cache-on-failure: true
          cache-bin: true

      - name: cargo build --workspace --all-targets
        # Compiles every target (lib, bin, tests, examples) without
        # running them. Catches Windows-specific compile errors in any
        # crate without needing the unit tests to be cross-platform.
        run: cargo build --workspace --all-targets

      - name: cargo test -p fabrik-cas
        # fabrik-cas is the only crate that doesn't depend on /bin/sh
        # for its tests; running it here proves the substrate's async
        # fs paths actually work on Windows, not just compile.
        run: cargo test -p fabrik-cas
