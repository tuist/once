  why:
    eyebrow: "Why Fabrik"
    title: "Why we built Fabrik."
    beats:
      - heading: "The world we built for"
        paragraphs:
          - "The tools most teams reach for to build, test, and run their code grew up around one particular user: a human developer at a terminal, running a command a few dozen times a day, skimming the output, and forming a mental model of the project from what scrolls past. Every choice these tools make is calibrated for that user. Verbose logs. Approximate errors. Implicit toolchains. Ergonomics tuned for one language at a time."
      - heading: "What changed"
        paragraphs:
          - "The shape of the work has shifted. Coding agents now sit alongside humans in the same repo. They iterate faster, run many attempts in parallel, and unlike humans, they cannot skim. A two-gigabyte log is not signal to an agent; it is a wall. They need the system that runs their work to talk back in structures they can query, not paragraphs they have to parse."
          - "The economics shift too. One developer running their build, test, and dev commands forty times a day is comfortable on a local cache. The same developer with two agents working alongside is not. Cache hit rates that felt fine for one person collapse the moment several attempts share most of their inputs but each re-run from scratch. Shared, content-addressed caching and the ability to offload work to remote runners stop being optimizations and become the price of doing the work at all."
      - heading: "Where the seams show"
        paragraphs:
          - "Today's tools were not built with this in mind, and the seams show. Diagnostics are written for a human reader, not a machine consumer. The dependency graph is implicit, locked inside the tool's head, instead of something you can ask questions of. Reproducibility is best-effort, which is fine when you trust your own laptop and uncomfortable when an agent claims a run passed on a machine you cannot see. Per-language tools fragment exactly when cross-language pull requests are getting more common, not less."
      - heading: "What Fabrik does differently"
        paragraphs:
          - "Fabrik is an automation kernel. It sits between humans, coding agents, and the execution infrastructure beneath them: local cache, remote runners, and the toolchains they invoke. Every action is content-addressed, with a declared input digest and a deterministic environment, so a cache hit on your laptop, in CI, and on a remote runner all mean the same thing. Diagnostics are structured. The graph is queryable. Targets across languages share one declaration model. The result is a substrate that gets out of a developer's way and gives an agent something to reason about."
  what:
    eyebrow: "What Fabrik runs"
    title: "One graph for every kind of work."
    lede: "Languages with first-class targets, custom commands, and a cooperative path for existing toolchains all share the same content-addressed graph."
    languages:
      - name: Rust
        mark: rust
        body: "Per-crate targets for binaries, libraries, tests, and proc macros. Dependency resolution, compilation, and tests, all cached."
        tags: [Resolve, Build, Test]
      - name: Swift
        mark: swift
        body: "Apple platform targets for iOS and macOS, including simulator-aware runtimes for agents to launch, log, and inspect apps."
        tags: [Resolve, Build, Test]
      - name: Elixir
        mark: elixir
        body: "First-class Elixir and Erlang on a pinned OTP pair. Mix-free per-module compilation under one cached graph."
        tags: [Resolve, Build, Test]
    addLanguage:
      title: "Add a language"
      body: "The target model is open. Propose or contribute a new language frontend on GitHub."
      cta: "Contribute on GitHub →"
    extras:
      - title: Tasks
        body: "Any shell command becomes a content-addressed target. Declare argv, inputs, outputs, env, and resource needs; replays are cache hits."
        icon: terminal
      - title: "The cooperative model"
        body: "Fabrik coexists with your existing native toolchain configuration, cached as one action. Move to granular targets at your own pace. No rewrite to start."
        icon: plug
  howItWorks:
    eyebrow: "How it works"
    title: "Declare targets, build the graph."
    lede: "A fabrik.toml file declares targets in plain, structured form. Fabrik turns them into a content-addressed action graph that both humans and agents can inspect."
    bullets:
      - "Per-package `fabrik.toml`, one per directory."
      - "Cache lives in `.fabrik/` at the workspace root. Gitignored."
      - "A one-line edit in a leaf crate invalidates only that crate and its reverse deps."
    snippet:
      filename: "app/fabrik.toml"
      body: |
        [[rust.library]]
        name = "greeter"
        srcs = ["src/lib.rs"]

        [[rust.binary]]
        name = "hello"
        srcs = ["src/main.rs"]
        deps = ["greeter"]

        [[rust.test]]
        name = "greeter_test"
        srcs = ["tests/greeter.rs"]
        crate_root = "tests/greeter.rs"
        deps = ["greeter"]
  faq:
    eyebrow: FAQ
    title: "Questions, answered."
    items:
      - q: "Is Fabrik production-ready?"
        a: "Fabrik builds Fabrik. The cargo_binary cooperative path is the production route today; granular targets are wiring up build-script support and per-target feature resolution."
      - q: "Does it replace your native toolchain?"
        a: "No. You can run your native toolchain configuration in the cooperative model as a cached action, or use granular per-language targets where they exist. Most teams start cooperative and migrate to granular incrementally."
      - q: "Why is this agent-native?"
        a: "Agents get the same APIs humans get: structured diagnostics, causality queries, and inspectable cache. The build is no longer a black box for the tool writing your code."
      - q: "How is caching different?"
        a: "Every action is keyed by a content-addressed digest of its inputs and environment. The same digest hits locally, in CI, or on a remote build farm."
  cta:
    title: "Ready to try Fabrik?"
    lede: "Install with mise, run `fabrik init`, and start declaring targets."
    actions:
      - text: "Read the docs"
        href: "/guide/what-is-fabrik"
        variant: invert
        icon: "arrow-right"
      - text: "Star on GitHub"
        href: "https://github.com/tuist/fabrik"
        variant: invert-outline
        icon: github

