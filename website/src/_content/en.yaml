home:
  meta:
    title: "Once: cacheable and remotely executable project scripts"
    description: "Once makes project scripts cacheable, observable, and remotely executable for developers, CI, and coding agents."
  hero:
    badge: "Open source · MIT licensed"
    byline: "Built by the Tuist team"
    bylineHref: "https://tuist.dev"
    title: "Run once. Reuse anywhere."
    subtitle: "Once turns ordinary project scripts into content-addressed actions with explicit inputs, outputs, environment, and runtime metadata."
    actions:
      - text: "Read the docs"
        href: "https://once.tuist.dev/guide/what-is-once"
        variant: primary
        icon: "arrow-right"
      - text: "View on GitHub"
        href: "https://github.com/tuist/once"
        variant: secondary
        icon: github
    terminal:
      title: "scripts/build-assets.sh"
      body: |
        #!/usr/bin/env bash
        # once input "../assets/**/*"
        # once output "../dist/"
        # once cwd ".."

        npm run build-assets
  why:
    eyebrow: "Why Once"
    title: "Scripts should not pay the same cost twice."
    beats:
      - heading: "The work already exists"
        paragraphs:
          - "Every repository has scripts that matter: generators, fixture builders, packaging flows, local checks, deploy hooks, and CI glue. They are too useful to rewrite as custom build rules and too expensive to keep rerunning blindly."
      - heading: "Agents make the cost visible"
        paragraphs:
          - "Coding agents run the same setup and validation loops many times. Without a cacheable contract, each attempt starts from scratch and leaves only terminal output behind."
      - heading: "Once adds the missing contract"
        paragraphs:
          - "Declare the command, inputs, outputs, env, cwd, and runtime metadata. Once hashes that contract, restores prior results when it can, and can send the same action to remote compute when local execution is not the right place."
  howItWorks:
    eyebrow: "How it works"
    title: "Declare the script contract."
    lede: "Once turns script contracts into cacheable actions that can run locally or remotely."
    bullets:
      - "Use `# once` headers in script files."
      - "Cache state lives under `.once/` and shared cache providers can be configured in `once.toml`."
      - "Remote execution uses the same action contract as local execution."
    snippets:
      - label: "Bash"
        filename: "scripts/build-assets.sh"
        body: |
          #!/usr/bin/env bash
          # once input "../assets/**/*"
          # once output "../dist/"
          # once cwd ".."

          npm run build-assets
      - label: "Node.js"
        filename: "scripts/build-assets.mjs"
        body: |
          #!/usr/bin/env node
          // once input "../src/**/*.js"
          // once output "../dist/"
          // once cwd ".."

          await import("../scripts/build-assets.mjs")
      - label: "Python"
        filename: "scripts/build_assets.py"
        body: |
          #!/usr/bin/env python3
          # once input "../src/**/*.py"
          # once output "../dist/"
          # once cwd ".."

          print("build assets")
      - label: "Ruby"
        filename: "scripts/build_assets.rb"
        body: |
          #!/usr/bin/env ruby
          # once input "../lib/**/*.rb"
          # once output "../dist/"
          # once cwd ".."

          puts "build assets"
  faq:
    eyebrow: FAQ
    title: "Questions, answered."
    items:
      - q: "Is Once production-ready?"
        a: "Once is early. The script cache, remote execution path, and runtime API are the core focus."
      - q: "Does it replace my build system?"
        a: "No. Keep Cargo, pnpm, Xcode, Buck, Bazel, or whatever already works. Once focuses on the scripts and command workflows around those tools."
      - q: "Why is this useful for agents?"
        a: "Agents get structured runtime data and can reuse prior script results instead of scraping logs and repeating unchanged work."
      - q: "How is caching different?"
        a: "Every action is keyed by a content-addressed digest of its declared inputs and execution contract."
  cta:
    title: "Ready to try Once?"
    lede: "Declare one script and run it through the cache."
    actions:
      - text: "Read the docs"
        href: "https://once.tuist.dev/guide/what-is-once"
        variant: invert
        icon: "arrow-right"
      - text: "Star on GitHub"
        href: "https://github.com/tuist/once"
        variant: invert-outline
        icon: github

