[tools]
erlang = "29.0.2"
elixir = "1.20.0-otp-29"
rust = "1.88"
ruby = "4.0.5"
shellspec = "latest"
git-cliff = "2.13.1"
"github:tuist/blick" = "0.10.0"
"github:superradcompany/microsandbox" = "0.5.5"
node = "26.3.0"
"npm:opencode-ai" = "1.16.2"
aube = "1.19.0"
helm = "3.21.0"
kubectl = "1.34.6"
jq = "1.8.1"
"1password-cli" = "2.32.0"

[env]
CARGO_TERM_COLOR = "always"
CARGO_INCREMENTAL = "0"
CARGO_PROFILE_DEV_DEBUG = "line-tables-only"
CARGO_PROFILE_TEST_DEBUG = "line-tables-only"
RUST_BACKTRACE = "1"
