[tools]
erlang = "29.0.2"
elixir = "1.20.1"
rust = "1.96.0"
ruby = "4.0.5"
shellspec = "latest"
git-cliff = "2.13.1"
"github:tuist/blick" = "0.10.0"
"github:superradcompany/microsandbox" = "0.5.6"
node = "26.3.0"
"npm:opencode-ai" = "1.17.7"
aube = "1.22.0"
helm = "3.21.1"
kubectl = "1.36.2"
jq = "1.8.1"
"1password-cli" = "2.32.0"

[env]
CARGO_TERM_COLOR = "always"
CARGO_INCREMENTAL = "0"
CARGO_PROFILE_DEV_DEBUG = "line-tables-only"
CARGO_PROFILE_TEST_DEBUG = "line-tables-only"
RUST_BACKTRACE = "1"
