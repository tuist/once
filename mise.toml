[tools]
rust = "1.96.0"
shellspec = "latest"
git-cliff = "2.13.1"
"github:tuist/blick" = "0.10.0"
"github:superradcompany/microsandbox" = "0.5.5"
node = "22.11.0"
"npm:opencode-ai" = "1.15.0"
aube = "1.18.1"

[env]
CARGO_TERM_COLOR = "always"
CARGO_INCREMENTAL = "0"
CARGO_PROFILE_DEV_DEBUG = "line-tables-only"
CARGO_PROFILE_TEST_DEBUG = "line-tables-only"
RUST_BACKTRACE = "1"
