# Production values for the Once Helm chart.
#
# This chart assumes the cluster has cert-manager, ingress-nginx,
# external-dns, and external-secrets-operator with a 1Password
# ClusterSecretStore named `onepassword`.

nameOverride: ""
fullnameOverride: "once"

host: buildonce.dev

image:
  repository: ghcr.io/tuist/once-web
  tag: ""
  pullPolicy: IfNotPresent
  pullSecretName: ghcr-pull

# Single replica: the site is static and runs on a single-node cluster, so
# horizontal scaling and HA are not achievable or needed right now.
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Disabled: an HPA can't scale past a single-node cluster, and there is no
# load to autoscale for a static site.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75

# Disabled: with one replica, a minAvailable of 1 would block node drains
# during CAPI rollouts instead of protecting availability.
pdb:
  enabled: false
  minAvailable: 1

service:
  port: 80
  targetPort: 4000

ingress:
  className: nginx
  clusterIssuer: letsencrypt-prod

env: {}

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

externalSecrets:
  enabled: true
  refreshInterval: 1h
  storeRef:
    name: onepassword
    kind: ClusterSecretStore
  items:
    SECRET_KEY_BASE:
      remoteRef: "once-secret-key-base/password"
  pullSecret:
    enabled: true
    item: "once-ghcr-pull"
    field: "notesPlain"

postgres:
  # Kept running but unused by the app today; a single instance frees a
  # replica pod and its 20Gi volume. Dropping Postgres entirely needs app
  # changes (Repo is started unconditionally and runtime.exs requires
  # DATABASE_URL), so that is left for the larger restructure.
  enabled: true
  instances: 1
  storageSize: 20Gi
  storageClass: hcloud-volumes
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  database: once
  owner: once
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
