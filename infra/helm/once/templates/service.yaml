apiVersion: v1
kind: Service
metadata:
  name: {{ include "once.fullname" . }}
  labels:
    {{- include "once.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "once.webSelectorLabels" . | nindent 4 }}
