{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "once.appSecretName" . }}
  labels:
    {{- include "once.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ include "once.appSecretName" . }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        {{- range $env, $cfg := .Values.externalSecrets.items }}
        {{ $env }}: "{{ printf "{{ .%s | trim }}" $env }}"
        {{- end }}
  data:
    {{- range $env, $cfg := .Values.externalSecrets.items }}
    - secretKey: {{ $env }}
      remoteRef:
        key: {{ $cfg.remoteRef | quote }}
    {{- end }}
{{- if and .Values.externalSecrets.pullSecret.enabled .Values.image.pullSecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.image.pullSecretName }}
  labels:
    {{- include "once.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.image.pullSecretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: "{{ `{{ .dockerconfigjson | b64dec }}` }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: "{{ .Values.externalSecrets.pullSecret.item }}/{{ .Values.externalSecrets.pullSecret.field }}"
{{- end }}
{{- end }}
