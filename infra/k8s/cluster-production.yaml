# Once production workload Cluster, topology mode against `tuist-hcloud`.
#
# Reconciled by the self-hosted CAPI + caph management cluster maintained
# in tuist/tuist. The cluster shape mirrors Atlas with a smaller general
# worker pool because Once currently runs only the Phoenix web workload.
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: once-production
  namespace: org-tuist
spec:
  clusterNetwork:
    services:
      cidrBlocks:
        - 10.128.0.0/12
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    serviceDomain: cluster.local
  topology:
    classRef:
      name: tuist-hcloud
    version: v1.34.6
    controlPlane:
      replicas: 3
    variables:
      - name: region
        value: fsn1
      - name: hcloudControlPlaneMachineType
        value: cpx22
      - name: hcloudWorkerMachineType
        value: cpx22
      - name: hcloudSSHKeyName
        value:
          - name: tuist-ops
    workers:
      machineDeployments:
        - class: hcloud-worker
          name: md-0
          replicas: 2
          failureDomain: fsn1
          metadata:
            labels:
              node.cluster.x-k8s.io/pool: general
