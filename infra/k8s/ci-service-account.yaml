# ServiceAccount used by GitHub Actions to deploy the Once Helm chart.

apiVersion: v1
kind: Namespace
metadata:
  name: once-production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: once-production
---
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-deployer-token
  namespace: once-production
  annotations:
    kubernetes.io/service-account.name: github-actions-deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: once-github-actions-deployer
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
    namespace: once-production
