[workspace]
resolver = "2"
members = [
    "crates/fabrik-cli",
    "crates/fabrik-core",
    "crates/fabrik-cas",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.86"
license = "MIT"
repository = "https://github.com/tuist/fabrik"

[workspace.dependencies]
fabrik-core = { path = "crates/fabrik-core" }
fabrik-cas = { path = "crates/fabrik-cas" }

anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "1"

[profile.release]
lto = "thin"
codegen-units = 1
